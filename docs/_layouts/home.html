---
layout: default
---

<main>
  <h1 style="text-align: center">Jekyll Tabler Plugin</h1>
  <div class="content">
    <p>
      Search and copy the liquid tag of
      <a href="https://tabler.io/icons" target="_blank">Tabler Icons</a>
      for Jekyll's sites.
    </p>
  </div>

  <div class="icon-type">
    <button
      class="icon-type-btn"
      data-tabler-type="all"
      data-tabler-type-btn>
      All
    </button>
    <button
      class="icon-type-btn"
      data-tabler-type="outline"
      data-tabler-type-btn>
      Outline
    </button>
    <button
      class="icon-type-btn"
      data-tabler-type="filled"
      data-tabler-type-btn>
      Filled
    </button>
  </div>
  <form class="search_form">
    <input
      type="text"
      class="search_input"
      name="search-input"
      id="icon-search-input" />
  </form>
  <section class="icons">
    <div class="icons_grid" id="icons-display"></div>
  </section>
  <div id="pagination-container"></div>
  <div id="no-results-message">
    No icons found. Try a different search!
  </div>
  <footer class="site_footer" role="contentinfo">
    <div class="footer_meta">
      <p>
        © {{ site.time | date: '%Y' }}
        <a
          href="https://phothinmg.github.io/"
          target="_blank"
          id="copyright-link">Pho Thin Maung</a>
      </p>
      <div class="footer_icons">
        <button
          type="button"
          aria-label="Theme Switch"
          id="data-theme">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round">
            <path
              stroke="none"
              d="M0 0h24v24H0z"
              fill="none" />
            <path d="M8 12a4 4 0 1 0 8 0a4 4 0 1 0 -8 0" />
            <path d="M3 12h1m8 -9v1m8 8h1m-9 8v1m-6.4 -15.4l.7 .7m12.1 -.7l-.7 .7m0 11.4l.7 .7m-12.1 -.7l-.7 .7" />
          </svg>
        </button>
        <a
          href="https://github.com/phothinmg/jekyll-tabler"
          id="git-repo"
          aria-label="Github Repo"
          target="_blank">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round">
            <path
              stroke="none"
              d="M0 0h24v24H0z"
              fill="none" />
            <path d="M9 19c-4.3 1.4 -4.3 -2.5 -6 -3m12 5v-3.5c0 -1 .1 -1.4 -.5 -2c2.8 -.3 5.5 -1.4 5.5 -6a4.6 4.6 0 0 0 -1.3 -3.2a4.2 4.2 0 0 0 -.1 -3.2s-1.1 -.3 -3.5 1.3a12.3 12.3 0 0 0 -6.2 0c-2.4 -1.6 -3.5 -1.3 -3.5 -1.3a4.2 4.2 0 0 0 -.1 3.2a4.6 4.6 0 0 0 -1.3 3.2c0 4.6 2.7 5.7 5.5 6c-.6 .6 -.6 1.2 -.5 2v3.5" />
          </svg>
        </a>
      </div>
    </div>
  </footer>
</main>
