{% assign icon_name = include.icon %}
{% assign icon_data = site.data.outline[icon_name] %}
{% if icon_data %}
  {% assign icon_size = include["size"] | default: 24 %}
  {% assign icon_color = include["icon_color"] | default: "currentColor" %}
  {% assign icon_class = "jekyll-tabler-icon" %}

  <svg
    xmlns="http://www.w3.org/2000/svg"
    width="{{ icon_size }}"
    height="{{ icon_size }}"
    viewBox="0 0 24 24"
    fill="none"
    stroke={{ icon_color }}
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    class="{{ icon_class | append: " " | append: icon_name }}"
    data-jekyll-tabler-icon>
  <title>{{ icon_name }}</title>
  <path
    stroke="none"
    d="M0 0h24v24H0z"
    fill="none" />
  {% for data in icon_data %}
    <path d="{{ data }}" />
  {% endfor %}
</svg>{% endif %}
