{% assign type = include.type %}
{% assign total_icons = include.size %}
{% assign search_text = "Search " %}
{% assign last_text = " icons ..." %}
<form action="" class="search_form">
  <input
    type="text"
    id="icon-search-input"
    placeholder="{{ search_text | append: total_icons |  append: ' '|  append: type | append: last_text }}"
    class="search_input"
    name="search-input"
    id="icon-search-input" />
</form>
