name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    # If you configured a GitHub environment on RubyGems, you must use it here.
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Extract release version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Verify tag matches version
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${RELEASE_VERSION#v}"
          export VERSION
          ruby -e 'require "./lib/version"; abort("tag/version mismatch") unless Jekyll::Tabler::VERSION == ENV.fetch("VERSION")'

      - name: Build all gems
        run: gem build jekyll-tabler.gemspec

      - name: Configure RubyGems credentials
        uses: rubygems/configure-rubygems-credentials@v2.0.0

      - name: Publish gems
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: bash bin/publish "${RELEASE_VERSION#v}"
